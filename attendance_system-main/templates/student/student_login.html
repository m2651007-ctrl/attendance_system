<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول الطالب</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="header">جامعة حائل | دخول الطالب</div>

    <div class="card center">
        <h2 class="title">تسجيل دخول الطالب</h2>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post">
            <input type="text" name="university_id" placeholder="الرقم الجامعي" required>
            <input type="password" name="password" placeholder="كلمة المرور" required>
            <button class="btn" type="submit">دخول</button>
        </form>

        <p style="margin-top:14px; color:#64748b; text-align:center; line-height:1.8;">
            كلمة المرور الافتراضية للطالب الجديد تكون نفس الرقم الجامعي، ويمكن تغييرها بعد الدخول.
        </p>
    </div>
</body>
</html>
