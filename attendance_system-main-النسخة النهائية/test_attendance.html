<!DOCTYPE html>
<html>
<head>
    <title>Test Attendance Page</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .controls { margin: 20px 0; }
        .search-input { padding: 8px; margin-right: 10px; width: 200px; }
        .export-btn { padding: 8px 16px; background: #28a745; color: white; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border: 1px solid #ddd; }
        th { background: #f4f4f4; }
        .status-late { color: red; font-weight: bold; }
        .status-not-checked-out { color: orange; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Attendance Records Test</h1>
        
        <div class="controls">
            <input type="text" id="course-search" class="search-input" placeholder="Search by course...">
            <input type="text" id="student-search" class="search-input" placeholder="Search by student ID...">
            <button id="export-btn" class="export-btn">Export CSV</button>
        </div>
        
        <div id="attendance-container">
            <p>Loading...</p>
        </div>
    </div>

    <script>
        function formatTimestamp(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(timestamp);
            return date.toLocaleString('en-US', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
            });
        }

        function isLateCheckIn(checkInTime, sessionStartTime) {
            if (!checkInTime || !sessionStartTime) return false;
            const checkIn = new Date(checkInTime);
            const [hours, minutes] = sessionStartTime.split(':').map(Number);
            const sessionStart = new Date(checkIn);
            sessionStart.setHours(hours, minutes, 0, 0);
            const diffMinutes = (checkIn - sessionStart) / (1000 * 60);
            return diffMinutes > 15;
        }

        function getCheckoutStatus(checkOutTime) {
            return checkOutTime ? 'Checked Out' : 'Not Checked Out';
        }

        async function loadAttendance() {
            try {
                const courseSearch = document.getElementById('course-search').value;
                const studentSearch = document.getElementById('student-search').value;
                
                let url = '/admin/attendance/data?';
                const params = [];
                if (courseSearch) params.push(`course_search=${encodeURIComponent(courseSearch)}`);
                if (studentSearch) params.push(`student_search=${encodeURIComponent(studentSearch)}`);
                url += params.join('&') || 'admin/attendance/data';

                const response = await fetch(url);
                const result = await response.json();
                
                const container = document.getElementById('attendance-container');
                
                if (!result.ok) {
                    container.innerHTML = '<p>Error: ' + result.message + '</p>';
                    return;
                }
                
                if (!result.records || result.records.length === 0) {
                    container.innerHTML = '<p>No attendance records found</p>';
                    return;
                }
                
                let html = '<table><thead><tr><th>Student Name</th><th>Student ID</th><th>Course</th><th>Session</th><th>Instructor</th><th>Check-in</th><th>Check-out</th><th>Status</th></tr></thead><tbody>';
                
                result.records.forEach(record => {
                    const isLate = isLateCheckIn(record.check_in, record.session_start_time);
                    const checkoutStatus = getCheckoutStatus(record.check_out);
                    
                    let finalStatus = record.status;
                    if (isLate && record.status === 'Present') finalStatus = 'Late';
                    if (checkoutStatus === 'Not Checked Out') finalStatus = 'Not Checked Out';
                    
                    const statusClass = finalStatus === 'Late' ? 'status-late' : 
                                      finalStatus === 'Not Checked Out' ? 'status-not-checked-out' : '';
                    
                    html += `<tr>
                        <td>${record.student_name}</td>
                        <td>${record.university_id}</td>
                        <td>${record.course_name}</td>
                        <td>${record.session_id}</td>
                        <td>${record.instructor_name}</td>
                        <td>${formatTimestamp(record.check_in)}</td>
                        <td>${formatTimestamp(record.check_out)}</td>
                        <td class="${statusClass}">${finalStatus}</td>
                    </tr>`;
                });
                
                html += '</tbody></table>';
                container.innerHTML = html;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('attendance-container').innerHTML = '<p>Error loading data</p>';
            }
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', function() {
            loadAttendance();
            
            let searchTimeout;
            ['course-search', 'student-search'].forEach(id => {
                document.getElementById(id).addEventListener('input', function() {
                    clearTimeout(searchTimeout);
                    searchTimeout = setTimeout(loadAttendance, 300);
                });
            });
            
            document.getElementById('export-btn').addEventListener('click', function() {
                const courseSearch = document.getElementById('course-search').value;
                const studentSearch = document.getElementById('student-search').value;
                
                let url = '/admin/attendance/export?';
                const params = [];
                if (courseSearch) params.push(`course_search=${encodeURIComponent(courseSearch)}`);
                if (studentSearch) params.push(`student_search=${encodeURIComponent(studentSearch)}`);
                url += params.join('&') || 'admin/attendance/export';
                
                window.open(url, '_blank');
            });
        });
    </script>
</body>
</html>
