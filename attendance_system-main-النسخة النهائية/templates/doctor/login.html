<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login Instructor — University of Hail</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#0b3c5d;--navy-mid:#0d4f7a;--navy-lt:#1a6494;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;min-height:100vh;background:linear-gradient(135deg,#0a1929 0%,var(--navy-mid) 55%,var(--navy-lt) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.logo-area{text-align:center;margin-bottom:28px;animation:fadeDown .5s ease both}
.logo-icon{width:82px;height:82px;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.22);border-radius:22px;display:inline-flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:16px;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.logo-title{font-size:28px;font-weight:800;color:#fff}
.logo-sub{font-size:14px;color:rgba(255,255,255,.6);margin-top:5px}
.card{background:#fff;border-radius:22px;padding:38px 34px;width:100%;max-width:440px;box-shadow:0 24px 64px rgba(0,0,0,.25);animation:fadeUp .5s ease both}
.card-title{font-size:21px;font-weight:800;color:var(--navy);text-align:center;margin-bottom:5px}
.card-sub{font-size:13px;color:#64748b;text-align:center;margin-bottom:28px}
.error-box{background:#fee2e2;border:1px solid #fecaca;color:#dc2626;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--navy);margin-bottom:7px}
.input-wrap{position:relative}
.input-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:16px;opacity:.4;pointer-events:none}
.form-group input{width:100%;padding:12px 44px 12px 14px;border:1.5px solid #dde4ed;border-radius:11px;font-size:14px;font-family:'Tajawal',sans-serif;color:#1a2332;background:#f8fafc;outline:none;transition:all .2s}
.form-group input:focus{border-color:var(--navy);background:#fff;box-shadow:0 0 0 3px rgba(11,60,93,.08)}
.form-group input::placeholder{color:#a0aec0}
.submit-btn{width:100%;background:linear-gradient(135deg,var(--navy),var(--navy-lt));color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer;transition:all .2s;margin-top:6px;box-shadow:0 4px 16px rgba(11,60,93,.35)}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(11,60,93,.45)}
.footer{margin-top:26px;font-size:12px;color:rgba(255,255,255,.4);text-align:center}
@keyframes fadeDown{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="logo-area">
  <div class="logo-icon">🎓</div>
  <div class="logo-title">University of Hail</div>
  <div class="logo-sub">Smart Attendance System</div>
</div>
<div class="card">
  <div class="card-title">Login Instructor 🔐</div>
  <div class="card-sub">Enter your credentials to access the portal</div>
  {% if error %}
  <div class="error-box">⚠️ {{ error }}</div>
  {% endif %}
  <form method="post">
    <div class="form-group">
      <label>Username</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input type="text" name="username" placeholder="Enter your username" required autocomplete="username">
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
    </div>
    <button class="submit-btn" type="submit">→ Sign In</button>
  </form>
</div>
<div class="footer">University of Hail © 2026 — Smart Attendance System</div>
</body>
</html>
