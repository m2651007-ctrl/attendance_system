<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Student Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="header">University of Hail | Student Login</div>

    <div class="card center">
        <h2 class="title">Student Login</h2>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post">
            <input type="text" name="university_id" placeholder="University ID" required>
            <input type="password" name="password" placeholder="Password" required>
            <button class="btn" type="submit">Login</button>
        </form>

        <p style="margin-top:14px; color:#64748b; text-align:center; line-height:1.8;">
            Password اNoفتراضية للstudents الجديد تكون نفس University ID، ويمكن تغييرها بعد الLogin.
        </p>
    </div>
</body>
</html>
