<script>
const CHECK_BEFORE_SEC  = 60;
const LATE_MIN          = 15;
const CLOSE_AFTER_MIN   = 15;
const CHECKOUT_BEFORE   = 5;
const CAPTURE_MS        = 1100;
const POLL_SEC          = 20;
const MOTION_THRESHOLD  = 3.5;
const MOTION_FRAMES     = 5;

const room = sessionStorage.getItem("kiosk_room");
const code = sessionStorage.getItem("kiosk_code");
if (!room || !code) { window.location.href = "/kiosk/setup"; }

let activeSession = null;
let kioskState    = "waiting";
let cntPresent    = 0, cntCheckout = 0;
let busy          = false;
let clearBoxTimer = null;
let frameHist     = [];
let lastFP        = null;
let studentTimer  = null;

// ── Silent Blink Detection ──
let faceMesh = null;
let faceMeshReady = false;
let recentBlink = false;
let lastBlinkAt = 0;
let blinkInProgress = false;
const EAR_THRESHOLD = 0.22;
const BLINK_VALID_DURATION = 8000;  // الرمشة تظل valid لمدة 8 ثواني

const video     = document.getElementById("video");
const canvas    = document.getElementById("canvas");
const overlay   = document.getElementById("overlay");
const octx      = overlay.getContext("2d");
const faceGuide = document.getElementById("faceGuide");

document.getElementById("roomName").textContent = room || "—";

// Clock
function updateClock(){
  const n = new Date();
  document.getElementById("clock").textContent =
    n.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
}
setInterval(updateClock,1000); updateClock();

// ── Eye Aspect Ratio (EAR) ──
const LEFT_EYE_TOP    = [159, 158];
const LEFT_EYE_BOTTOM = [145, 153];
const LEFT_EYE_LEFT   = 33;
const LEFT_EYE_RIGHT  = 133;
const RIGHT_EYE_TOP    = [386, 385];
const RIGHT_EYE_BOTTOM = [374, 380];
const RIGHT_EYE_LEFT   = 362;
const RIGHT_EYE_RIGHT  = 263;

function _dist(p1, p2) {
  return Math.sqrt((p1.x-p2.x)**2 + (p1.y-p2.y)**2);
}

function _calcEAR(lm, topIdxs, botIdxs, leftIdx, rightIdx) {
  const top1 = lm[topIdxs[0]], top2 = lm[topIdxs[1]];
  const bot1 = lm[botIdxs[0]], bot2 = lm[botIdxs[1]];
  const left = lm[leftIdx], right = lm[rightIdx];
  const vert  = (_dist(top1, bot1) + _dist(top2, bot2)) / 2;
  const horiz = _dist(left, right);
  return vert / (horiz + 1e-6);
}

function _processLandmarks(lm) {
  if (!lm || lm.length === 0) return;
  const leftEAR  = _calcEAR(lm, LEFT_EYE_TOP, LEFT_EYE_BOTTOM, LEFT_EYE_LEFT, LEFT_EYE_RIGHT);
  const rightEAR = _calcEAR(lm, RIGHT_EYE_TOP, RIGHT_EYE_BOTTOM, RIGHT_EYE_LEFT, RIGHT_EYE_RIGHT);
  const ear = (leftEAR + rightEAR) / 2;

  const now = Date.now();
  if (ear < EAR_THRESHOLD && !blinkInProgress) {
    blinkInProgress = true;
  }
  if (ear > EAR_THRESHOLD + 0.05 && blinkInProgress) {
    blinkInProgress = false;
    recentBlink = true;
    lastBlinkAt = now;
    console.log("✅ Blink detected, EAR=" + ear.toFixed(3));
  }

  // expire الرمشة بعد BLINK_VALID_DURATION
  if (recentBlink && (now - lastBlinkAt) > BLINK_VALID_DURATION) {
    recentBlink = false;
  }
}

async function _initFaceMesh() {
  try {
    faceMesh = new FaceMesh({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/${file}`
    });
    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    faceMesh.onResults((results) => {
      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        _processLandmarks(results.multiFaceLandmarks[0]);
      }
    });
    await faceMesh.initialize();
    faceMeshReady = true;
    console.log("✅ FaceMesh جاهز");
    setInterval(async () => {
      if (faceMeshReady && video.videoWidth > 0) {
        try { await faceMesh.send({image: video}); } catch(e) {}
      }
    }, 150);
  } catch(e) {
    console.error("FaceMesh init error:", e);
  }
}

// ── Camera — يجرب كل الكاميرات المتاحة ──
async function startCamera(){
  try {
    // أولاً جرب بدون facingMode — يشتغل على اللاب توب والجوال
    const s = await navigator.mediaDevices.getUserMedia({
      video: { width:{ideal:1280}, height:{ideal:720} },
      audio: false
    });
    video.srcObject = s;
    await video.play();
    syncOverlay();
    setStatus("scanning","📷 الكاميرا جاهزة");
    return;
  } catch(e1) {}

  try {
    // ثانياً جرب أي كاميرا متاحة
    const s = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    video.srcObject = s;
    await video.play();
    syncOverlay();
    setStatus("scanning","📷 الكاميرا جاهزة");
    return;
  } catch(e2) {}

  try {
    // ثالثاً جرب الكاميرا الأمامية (للجوال)
    const s = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" },
      audio: false
    });
    video.srcObject = s;
    await video.play();
    syncOverlay();
    setStatus("scanning","📷 الكاميرا جاهزة");
    return;
  } catch(e3) {
    setStatus("error","❌ تعذر تشغيل الكاميرا — تأكد من الإذن");
  }
}

function syncOverlay(){
  overlay.width  = window.innerWidth;
  overlay.height = window.innerHeight;
}
window.addEventListener("resize",syncOverlay);
syncOverlay();

function clearBox(){ octx.clearRect(0,0,overlay.width,overlay.height); }

// Anti-spoofing
function getFingerprint(){
  if(!video.videoWidth) return null;
  const t = document.createElement("canvas");
  t.width=24; t.height=18;
  t.getContext("2d").drawImage(video,0,0,24,18);
  const d = t.getContext("2d").getImageData(0,0,24,18).data;
  const a = new Uint8Array(24*18);
  for(let i=0,j=0;i<d.length;i+=4) a[j++]=(d[i]*.299+d[i+1]*.587+d[i+2]*.114)|0;
  return a;
}

function motionDiff(a,b){
  if(!a||!b) return 999;
  let s=0; for(let i=0;i<a.length;i++) s+=Math.abs(a[i]-b[i]);
  return s/a.length;
}

// ── Anti-Spoofing متقدم ──
// يراقب: حركة البيكسل + تغيّر texture + عدم ثبات الصورة + temporal variance

function getGrayFrame(w, h) {
  if (!video.videoWidth) return null;
  const t = document.createElement("canvas");
  t.width = w; t.height = h;
  t.getContext("2d").drawImage(video, 0, 0, w, h);
  const d = t.getContext("2d").getImageData(0, 0, w, h).data;
  const g = new Float32Array(w * h);
  for (let i = 0, j = 0; i < d.length; i += 4)
    g[j++] = d[i] * .299 + d[i+1] * .587 + d[i+2] * .114;
  return g;
}

// بصمة الحركة - 24x18
function getFingerprint() {
  return getGrayFrame(24, 18);
}

function motionDiff(a, b) {
  if (!a || !b || a.length !== b.length) return 999;
  let s = 0;
  for (let i = 0; i < a.length; i++) s += Math.abs(a[i] - b[i]);
  return s / a.length;
}

// Local texture variance - دليل على جلد حقيقي
function getTextureVariance() {
  const g = getGrayFrame(64, 64);
  if (!g) return 0;
  let sum = 0;
  for (const v of g) sum += v;
  const mean = sum / g.length;
  let sq = 0;
  for (const v of g) sq += (v - mean) ** 2;
  return Math.sqrt(sq / g.length);
}

// Temporal variance - الوجه الحي يتغيّر، الصورة ثابتة
if (!window._spoofState) window._spoofState = {
  frameHist: [],
  texHist: [],
  lastFP: null,
  liveFrames: 0,
  spoofFrames: 0,
};

function isLive() {
  const st = window._spoofState;
  const fp = getFingerprint();

  // حركة البيكسل
  const diff = motionDiff(fp, st.lastFP);
  st.lastFP = fp;
  st.frameHist.push(diff);
  if (st.frameHist.length > MOTION_FRAMES) st.frameHist.shift();

  // texture
  const tex = getTextureVariance();
  st.texHist.push(tex);
  if (st.texHist.length > 10) st.texHist.shift();

  if (st.frameHist.length < MOTION_FRAMES) return false;

  const avgMotion  = st.frameHist.reduce((a,b)=>a+b,0) / st.frameHist.length;
  const maxMotion  = Math.max(...st.frameHist);
  const minMotion  = Math.min(...st.frameHist);
  const motionVar  = maxMotion - minMotion;

  // texture change عبر الزمن
  const texChange  = st.texHist.length > 5
    ? Math.max(...st.texHist) - Math.min(...st.texHist)
    : 999;

  // شروط الوجه الحي
  const motionOk  = avgMotion > MOTION_THRESHOLD;   // حركة كافية
  const varOk     = motionVar  > 6.0;               // تذبذب طبيعي
  const texOk     = tex        > 20.0;              // texture غير صورة مطبوعة
  const texVarOk  = texChange  > 1.5;               // texture يتغيّر مع الوقت

  const live = motionOk && varOk && texOk && texVarOk;

  if (live)  { st.liveFrames++;  st.spoofFrames = Math.max(0, st.spoofFrames - 1); }
  else       { st.spoofFrames++; st.liveFrames  = Math.max(0, st.liveFrames  - 1); }

  // يحتاج 3 فريمات حية متتالية قبل القبول
  return st.liveFrames >= 3;
}

function resetSpoofState() {
  window._spoofState = { frameHist:[], texHist:[], lastFP:null, liveFrames:0, spoofFrames:0 };
}

// Draw Box
function drawFaceBox(box, name, id, recognized, late){
  syncOverlay(); clearBox();
  const sx = window.innerWidth/640, sy = window.innerHeight/480;
  const rawX = box[0]*sx, y = box[1]*sy, w = box[2]*sx, h = box[3]*sy;
  const x = window.innerWidth - rawX - w;
  const col = recognized ? (late?"#f59e0b":"#22c55e") : "#ef4444";

  octx.save();
  octx.shadowColor=col; octx.shadowBlur=18;
  octx.lineWidth=3.5; octx.strokeStyle=col;

  const cs=30, cr=10;
  const corners=[[x,y],[x+w-cs,y],[x,y+h-cs],[x+w-cs,y+h-cs]];
  corners.forEach(([cx,cy],i)=>{
    const R=i%2===1, B=i>=2;
    octx.beginPath();
    if(!R&&!B){octx.moveTo(cx+cr,cy);octx.lineTo(cx+cs,cy);octx.moveTo(cx,cy+cr);octx.lineTo(cx,cy+cs);octx.arc(cx+cr,cy+cr,cr,Math.PI,Math.PI*1.5);}
    else if(R&&!B){octx.moveTo(cx,cy);octx.lineTo(cx+cs-cr,cy);octx.moveTo(cx+cs,cy+cr);octx.lineTo(cx+cs,cy+cs);octx.arc(cx+cs-cr,cy+cr,cr,Math.PI*1.5,0);}
    else if(!R&&B){octx.moveTo(cx,cy);octx.lineTo(cx,cy+cs-cr);octx.moveTo(cx+cr,cy+cs);octx.lineTo(cx+cs,cy+cs);octx.arc(cx+cr,cy+cs-cr,cr,Math.PI*.5,Math.PI);}
    else{octx.moveTo(cx+cs,cy);octx.lineTo(cx+cs,cy+cs-cr);octx.moveTo(cx,cy+cs);octx.lineTo(cx+cs-cr,cy+cs);octx.arc(cx+cs-cr,cy+cs-cr,cr,0,Math.PI*.5);}
    octx.stroke();
  });

  if(name||id){
    octx.shadowBlur=0;
    const lines=[name||"",id||""].filter(Boolean);
    const fs=Math.max(13,Math.min(16,window.innerWidth/28));
    octx.font=`700 ${fs}px Tajawal,Arial`;
    const maxW=lines.reduce((m,l)=>Math.max(m,octx.measureText(l).width),0);
    const lw=maxW+28, lh=lines.length*(fs+6)+12;
    let lx=x, ly=y-lh-10;
    if(ly<4) ly=y+h+6;
    if(lx+lw>overlay.width-4) lx=overlay.width-lw-4;
    octx.fillStyle="rgba(6,13,20,.88)"; octx.strokeStyle=col; octx.lineWidth=1.5;
    roundRect(octx,lx,ly,lw,lh,10); octx.fill(); octx.stroke();
    octx.textAlign="center"; octx.textBaseline="top";
    lines.forEach((line,i)=>{
      octx.fillStyle=i===0?"#fff":"rgba(255,255,255,.65)";
      octx.font=i===0?`700 ${fs}px Tajawal,Arial`:`500 ${fs-2}px Tajawal,Arial`;
      octx.fillText(line,lx+lw/2,ly+8+i*(fs+6));
    });
  }
  octx.restore();
  if(clearBoxTimer) clearTimeout(clearBoxTimer);
  clearBoxTimer=setTimeout(()=>{clearBox();faceGuide.classList.remove("red");},2800);
}

function roundRect(ctx,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}

function setStatus(type,text){
  const el=document.getElementById("statusText");
  el.className="status-text st-"+type; el.textContent=text;
}

function setMode(state){
  kioskState=state;
  const badge=document.getElementById("modeBadge");
  const text=document.getElementById("modeText");
  const dot=document.getElementById("pulseDot");
  const hint=document.getElementById("hintText");
  badge.className="mode-badge "+state;
  if(state==="checkin"){
    text.textContent="✅ تسجيل الحضور"; dot.className="pulse pulse-green";
    faceGuide.classList.remove("red"); hint.textContent="ضع وجهك للتحضير";
    setStatus("scanning","📷 جاهز — ضع وجهك أمام الكاميرا");
  }else if(state==="checkout"){
    text.textContent="🚪 تسجيل الانصراف"; dot.className="pulse pulse-blue";
    faceGuide.classList.remove("red"); hint.textContent="ضع وجهك للانصراف";
    setStatus("scanning","🚪 وضع الانصراف — ضع وجهك");
  }else if(state==="closed"){
    text.textContent="🔒 انتهت المحاضرة"; dot.className="pulse pulse-red";
    faceGuide.classList.add("red"); hint.textContent="انتهى وقت التسجيل";
    setStatus("closed","🔒 انتهى وقت التسجيل");
  }else{
    text.textContent="⏳ بانتظار المحاضرة"; dot.className="pulse pulse-yellow";
    hint.textContent="ستبدأ المحاضرة قريباً";
    setStatus("warning","⏳ المحاضرة لم تبدأ بعد");
  }
}

function timeToMin(hhmm){ const[h,m]=(hhmm||"00:00").split(":").map(Number); return h*60+m; }
function nowMin(){ const n=new Date(); return n.getHours()*60+n.getMinutes()+n.getSeconds()/60; }

function updateProgress(startMin,endMin){
  const now=nowMin(), total=endMin-startMin, elapsed=now-startMin;
  const pct=Math.max(0,Math.min(100,(elapsed/total)*100));
  document.getElementById("progressFill").style.width=pct+"%";
  const rem=Math.max(0,endMin-now);
  document.getElementById("timeRemaining").textContent=
    rem>1 ? `⏰ ${Math.floor(rem)} دقيقة` : "⏰ أقل من دقيقة";
}

function determineState(s){
  if(!s){ setMode("waiting"); return; }
  const startMin=timeToMin(s.start_time), endMin=timeToMin(s.end_time);
  const now=nowMin();
  const openFrom=startMin-(CHECK_BEFORE_SEC/60), closeAt=endMin+CLOSE_AFTER_MIN;
  const checkoutFrom=endMin-CHECKOUT_BEFORE;
  updateProgress(startMin,endMin);
  if(now<openFrom) setMode("waiting");
  else if(now<checkoutFrom) setMode("checkin");
  else if(now<closeAt) setMode("checkout");
  else setMode("closed");
}

async function fetchSession(){
  try{
    const res=await fetch(`/kiosk/active?room_name=${encodeURIComponent(room)}&room_code=${encodeURIComponent(code)}`);
    const data=await res.json();
    if(!data.ok||!data.session){
      activeSession=null;
      document.getElementById("courseName").textContent="لا توجد محاضرة";
      document.getElementById("doctorBadge").textContent="👨‍🏫 —";
      setMode("waiting"); return;
    }
    activeSession=data.session;
    document.getElementById("courseName").textContent=data.session.course_name||"—";
    document.getElementById("doctorBadge").textContent="👨‍🏫 "+(data.session.doctor_name||"—");
    determineState(activeSession);
  }catch(e){ setStatus("error","❌ خطأ في الاتصال"); }
}

setInterval(()=>{ if(activeSession) determineState(activeSession); },1000);
setInterval(fetchSession,POLL_SEC*1000);
fetchSession();

setInterval(captureAndSend,CAPTURE_MS);

async function captureAndSend(){
  if(busy||!activeSession||!video.videoWidth) return;
  if(kioskState==="waiting"||kioskState==="closed") return;

  if(!isLive()) return;
  busy=true;
  try{
    const ctx=canvas.getContext("2d");
    ctx.save(); ctx.scale(-1,1); ctx.drawImage(video,-640,0,640,480); ctx.restore();
    const image=canvas.toDataURL("image/jpeg",.80);
    const res=await fetch("/kiosk/capture",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({image,room_name:room,room_code:code,mode:kioskState,blink_detected:recentBlink})
    });
    const data=await res.json();
    if(!data.ok){ setStatus("warning","⚠️ "+(data.message||"لا توجد محاضرة")); return; }
    if(!data.recognized){
      // تحقق من spoof
      if(data.spoof_detected) {
        showSpoofAlert(data.spoof_reason || "محاولة احتيال");
        setStatus("error","🚨 تحذير: محاولة تزوير تم تسجيلها!");
        faceGuide.classList.add("red");
        return;
      }
      if(data.box){ faceGuide.classList.add("red"); drawFaceBox(data.box,null,"غير مسجل ❌",false,false); setStatus("error","❌ وجه غير مسجل"); }
      return;
    }
    faceGuide.classList.remove("red");
    const stu=data.student;
    if(kioskState==="checkout"){
      if(data.checked_out){
        drawFaceBox(data.box,stu.name,stu.academic_number,true,false);
        showStudent(stu,"checkout"); setStatus("success","🚪 انصراف — "+stu.name);
        cntCheckout++; document.getElementById("cntCheckout").textContent=cntCheckout;
        beep(700,130); setTimeout(()=>beep(900,130),150);
      }else{
        drawFaceBox(data.box,stu.name,stu.academic_number,true,true);
        showStudent(stu,"late"); setStatus("warning","⚠️ "+(data.message||"انصراف مسبق"));
      }
    }else{
      if(data.new_record){
        const isLate=(stu.status||"").toLowerCase()==="late";
        drawFaceBox(data.box,stu.name,stu.academic_number,true,isLate);
        showStudent(stu,isLate?"late":"present");
        setStatus("success",isLate?"⏰ متأخر — "+stu.name:"✅ حضور — "+stu.name);
        cntPresent++; document.getElementById("cntPresent").textContent=cntPresent;
        beep(880,110); setTimeout(()=>beep(1200,110),130);
      }else{
        drawFaceBox(data.box,stu.name,stu.academic_number,true,false);
        showStudent(stu,"present"); setStatus("warning","⚠️ مسجل مسبقاً — "+stu.name);
      }
    }
  }catch(e){ setStatus("error","❌ خطأ"); }
  finally{ busy=false; }
}

function showStudent(stu,type){
  const card=document.getElementById("studentCard");
  document.getElementById("sAvatar").textContent=(stu.name||"؟")[0];
  document.getElementById("sName").textContent=stu.name||"—";
  document.getElementById("sId").textContent=stu.academic_number||"—";
  const b=document.getElementById("sBadge");
  if(type==="checkout"){b.className="student-badge sb-checkout";b.textContent="🚪 انصراف";}
  else if(type==="late"){b.className="student-badge sb-late";b.textContent="⏰ متأخر";}
  else{b.className="student-badge sb-present";b.textContent="✅ حاضر";}
  card.classList.add("show");
  if(studentTimer) clearTimeout(studentTimer);
  studentTimer=setTimeout(()=>card.classList.remove("show"),5000);
}

let audioCtx=null;
function beep(f,d){
  try{
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.frequency.value=f;g.gain.value=.06;o.connect(g);g.connect(audioCtx.destination);
    o.start();setTimeout(()=>o.stop(),d);
  }catch(e){}
}

// ── Spoof Alert ──
let spoofAlertTimer = null;


function showSpoofAlert(reason) {
  const alert = document.getElementById('spoofAlert');
  const msg   = document.getElementById('spoofMsg');
  alert.classList.add('show');

  // صوت تحذير
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    [200,150,200].forEach((f,i) => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.frequency.value = f; g.gain.value = .08; o.type = 'sawtooth';
      o.connect(g); g.connect(audioCtx.destination);
      o.start(audioCtx.currentTime + i*.15);
      o.stop(audioCtx.currentTime + i*.15 + .12);
    });
  } catch(e) {}

  // إغلاق تلقائي بعد 8 ثواني
  if (spoofAlertTimer) clearTimeout(spoofAlertTimer);
  spoofAlertTimer = setTimeout(closeSpoofAlert, 8000);

  // reset history لإعطاء فرصة جديدة
  resetSpoofState();
}

function closeSpoofAlert() {
  document.getElementById('spoofAlert').classList.remove('show');
  resetSpoofState();
  if (spoofAlertTimer) clearTimeout(spoofAlertTimer);
}

startCamera();
_initFaceMesh();
