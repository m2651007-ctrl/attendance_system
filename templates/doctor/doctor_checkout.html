<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>تسجيل الانصراف</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .video-wrap{
      position: relative;
      display: inline-block;
      width: 640px;
      height: 480px;
      border-radius: 16px;
      overflow: hidden;
      border: 0;
      box-shadow: 0 12px 30px rgba(0,0,0,.22);
      background: #000;
    }

    #video{
      width: 100%;
      height: 100%;
      display:block;
      object-fit: cover;
    }

    #overlay{
      position:absolute;
      top:0;
      left:0;
      width: 100%;
      height: 100%;
      z-index: 5;
      pointer-events:none;
    }

    .actions{
      display:flex;
      gap:10px;
      align-items:center;
      margin-top:10px;
      flex-wrap:wrap;
    }
  </style>
</head>
<body>

<div class="header">جامعة حائل | تسجيل الانصراف</div>

<div class="card center" style="width: 900px; max-width: 95%;">
  <h3 class="title">🟢 بث مباشر لتسجيل الانصراف</h3>

  <select id="session_id">
    <option value="">-- اختر المحاضرة --</option>
    {% for s in sessions %}
      <option value="{{ s[0] }}">{{ s[1] }}</option>
    {% endfor %}
  </select>

  <div class="actions">
    <span style="color:#666;">اختر المحاضرة ثم مرّر الطلاب أمام الكاميرا لتسجيل الانصراف.</span>
  </div>

  <div class="video-wrap" style="margin-top:15px;">
    <video id="video" autoplay playsinline></video>
    <canvas id="overlay"></canvas>
  </div>

  <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

  <hr style="margin:25px 0;">

  <h3 class="title">✅ سجل الحضور والانصراف</h3>

  <table>
    <thead>
      <tr>
        <th>الاسم</th>
        <th>الرقم الجامعي</th>
        <th>ID</th>
        <th>وقت الدخول</th>
        <th>وقت الانصراف</th>
        <th>الحالة</th>
      </tr>
    </thead>
    <tbody id="attBody">
      <tr><td colspan="6">اختر محاضرة لعرض السجل</td></tr>
    </tbody>
  </table>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const overlay = document.getElementById("overlay");
const octx = overlay.getContext("2d");

const sessionSelect = document.getElementById("session_id");
const attBody = document.getElementById("attBody");

let timer = null;
let busy = false;
let lastDrawAt = 0;

// منع تكرار سريع
const lastSeenAt = {};
const cooldownMs = 8000;

const SEND_W = 640, SEND_H = 480;

// تشغيل الكاميرا
navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => { video.srcObject = stream; })
  .catch(err => { alert("❌ لم يتم تشغيل الكاميرا"); console.error(err); });

// خلى overlay نفس مقاس الفيديو
function resizeOverlayToVideo(){
  const rect = video.getBoundingClientRect();
  overlay.width = Math.round(rect.width);
  overlay.height = Math.round(rect.height);
}
window.addEventListener("resize", resizeOverlayToVideo);
video.addEventListener("loadedmetadata", resizeOverlayToVideo);

sessionSelect.addEventListener("change", () => {
  stopLive();
  clearOverlay();
  for (const k in lastSeenAt) delete lastSeenAt[k];

  if (sessionSelect.value) {
    refreshTable();
    startLive();
  } else {
    attBody.innerHTML = `<tr><td colspan="6">اختر محاضرة لعرض السجل</td></tr>`;
  }
});

function startLive(){ timer = setInterval(captureAndSend, 900); }
function stopLive(){ if (timer) clearInterval(timer); timer = null; }
function clearOverlay(){ octx.clearRect(0,0,overlay.width,overlay.height); }

// ===== رسم احترافي (نفس الحضور) =====
function roundedRect(ctx, x, y, w, h, r){
  const radius = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.arcTo(x + w, y, x + w, y + h, radius);
  ctx.arcTo(x + w, y + h, x, y + h, radius);
  ctx.arcTo(x, y + h, x, y, radius);
  ctx.arcTo(x, y, x + w, y, radius);
  ctx.closePath();
}

function drawFaceBox(box, labelText, ok=true) {
  resizeOverlayToVideo();
  clearOverlay();

  // box جاية على SEND_W x SEND_H، نحولها لمقاس العرض الحالي
  const rect = video.getBoundingClientRect();
  const sx = rect.width / SEND_W;
  const sy = rect.height / SEND_H;

  let x = box[0] * sx;
  let y = box[1] * sy;
  let w = box[2] * sx;
  let h = box[3] * sy;

  x = Math.max(0, x);
  y = Math.max(0, y);
  w = Math.min(overlay.width - x, w);
  h = Math.min(overlay.height - y, h);

  const mainColor = ok ? "#22c55e" : "#ef4444"; // نفس الحضور (أخضر) + أحمر عند الخطأ

  octx.save();
  octx.shadowColor = "rgba(0,0,0,0.35)";
  octx.shadowBlur = 12;
  octx.shadowOffsetY = 4;

  // الإطار
  octx.lineWidth = 4;
  octx.strokeStyle = mainColor;
  roundedRect(octx, x, y, w, h, 14);
  octx.stroke();

  // خط داخلي خفيف
  octx.shadowColor = "transparent";
  octx.lineWidth = 1;
  octx.strokeStyle = "rgba(255,255,255,0.65)";
  roundedRect(octx, x + 1, y + 1, w - 2, h - 2, 13);
  octx.stroke();

  // اللابل فوق الإطار
  if (labelText) {
    octx.font = "600 16px Arial";

    const padX = 12;
    const textW = octx.measureText(labelText).width;
    const boxW = textW + padX * 2 + 14; // + مساحة نقطة
    const boxH = 34;

    let lx = x;
    let ly = y - boxH - 10;
    if (ly < 6) ly = y + 8;
    if (lx + boxW > overlay.width - 6) lx = overlay.width - boxW - 6;

    octx.fillStyle = "rgba(17,24,39,0.82)";
    octx.strokeStyle = mainColor;
    octx.lineWidth = 2;
    roundedRect(octx, lx, ly, boxW, boxH, 10);
    octx.fill();
    octx.stroke();

    // نقطة
    octx.fillStyle = mainColor;
    octx.beginPath();
    octx.arc(lx + 14, ly + boxH/2, 5, 0, Math.PI*2);
    octx.fill();

    // ✅ النص بالنص داخل مساحة النص (بدون ما النقطة تخربه)
    octx.fillStyle = "#fff";
    octx.textAlign = "center";
    octx.textBaseline = "middle";

    const leftPadForDot = 26;
    const textAreaX = lx + leftPadForDot;
    const textAreaW = boxW - leftPadForDot;

    const tx = textAreaX + (textAreaW / 2);
    const ty = ly + (boxH / 2);

    octx.fillText(labelText, tx, ty);

    octx.textAlign = "start";
    octx.textBaseline = "alphabetic";
  }

  octx.restore();

  lastDrawAt = Date.now();
  setTimeout(() => {
    if (Date.now() - lastDrawAt >= 1900) clearOverlay();
  }, 2000);
}

async function captureAndSend(){
  if (!sessionSelect.value || busy) return;
  busy = true;

  try{
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, SEND_W, SEND_H);
    const image = canvas.toDataURL("image/jpeg", 0.75);

    // ✅ مهم: نفس روابط الانصراف اللي عندك
    const res = await fetch("/doctor/attendance/checkout/capture", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ image, session_id: sessionSelect.value })
    });

    const data = await res.json();

    if (data.box && Array.isArray(data.box)){
      if (data.recognized && data.student){
        const uid = String(data.student.university_id || "");
        const now = Date.now();

        if (uid && lastSeenAt[uid] && (now - lastSeenAt[uid] < cooldownMs)) return;
        if (uid) lastSeenAt[uid] = now;

        const baseLabel = `${data.student.name} | ${data.student.academic_number}`;

        if (data.checked_out === true){
          drawFaceBox(data.box, `تم الانصراف ✅ | ${baseLabel}`, true);
          refreshTable();
        } else {
          drawFaceBox(data.box, `لا يوجد حضور مفتوح | ${baseLabel}`, false);
        }
      } else {
        drawFaceBox(data.box, "Unknown", false);
      }
    }

  }catch(e){
    console.error(e);
  }finally{
    busy = false;
  }
}

async function refreshTable(){
  // ✅ مهم: نفس رابط قائمة الانصراف
  const res = await fetch(`/doctor/attendance/checkout/list?session_id=${sessionSelect.value}`);
  const data = await res.json();
  if (!data.ok) return;

  if (!data.rows.length){
    attBody.innerHTML = `<tr><td colspan="6">لا يوجد سجلات بعد</td></tr>`;
    return;
  }

  attBody.innerHTML = data.rows.map(r => `
    <tr>
      <td>${r.name}</td>
      <td>${r.academic_number}</td>
      <td>${r.university_id}</td>
      <td>${r.check_in}</td>
      <td>${r.check_out || "-"}</td>
      <td>${r.status}</td>
    </tr>
  `).join("");
}
</script>

</body>
</html>
