<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>كشك الحضور — جامعة حائل</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #060d14;
      --panel:   #0a1929;
      --border:  #1a3348;
      --green:   #22c55e;
      --red:     #ef4444;
      --yellow:  #f59e0b;
      --blue:    #3b82f6;
      --white:   #f1f5f9;
      --muted:   #64748b;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== TOPBAR ===== */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      flex-wrap: wrap;
    }

    .topbar-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .topbar-label { font-size: 11px; color: var(--muted); font-weight: 500; }
    .topbar-value { font-size: 14px; font-weight: 700; color: var(--white); }

    .clock { font-family: monospace; font-size: 18px; font-weight: 700; color: var(--green); }

    /* MODE TOGGLE */
    .mode-toggle {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .mode-btn {
      border: none; border-radius: 8px; padding: 8px 16px;
      font-size: 13px; font-weight: 700; font-family: 'Tajawal', sans-serif;
      cursor: pointer; transition: all .2s;
    }

    .mode-btn.checkin  { background: rgba(34,197,94,.15);  color: var(--green); border: 1px solid rgba(34,197,94,.3); }
    .mode-btn.checkout { background: rgba(59,130,246,.15); color: var(--blue);  border: 1px solid rgba(59,130,246,.3); }
    .mode-btn.active-checkin  { background: var(--green); color: #000; }
    .mode-btn.active-checkout { background: var(--blue);  color: #fff; }

    .reset-btn {
      border: none; border-radius: 8px; padding: 8px 14px;
      font-size: 13px; font-weight: 700; font-family: 'Tajawal', sans-serif;
      cursor: pointer; background: rgba(239,68,68,.15);
      color: var(--red); border: 1px solid rgba(239,68,68,.3);
      transition: all .2s;
    }
    .reset-btn:hover { background: var(--red); color: #fff; }

    /* ===== MAIN LAYOUT ===== */
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 0;
      min-height: 0;
    }

    /* ===== CAMERA ===== */
    .camera-section {
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      max-height: calc(100vh - 120px);
    }

    #overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
      pointer-events: none;
    }

    /* ===== SIDE PANEL ===== */
    .side-panel {
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow-y: auto;
    }

    .panel-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 10px;
    }

    /* STATUS BOX */
    .status-box {
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all .3s;
    }

    .status-waiting  { background: rgba(100,116,139,.1); color: var(--muted); border: 1px solid var(--border); }
    .status-scanning { background: rgba(245,158,11,.1);  color: var(--yellow); border: 1px solid rgba(245,158,11,.3); }
    .status-success  { background: rgba(34,197,94,.1);   color: var(--green);  border: 1px solid rgba(34,197,94,.3); }
    .status-error    { background: rgba(239,68,68,.1);   color: var(--red);    border: 1px solid rgba(239,68,68,.3); }
    .status-warning  { background: rgba(245,158,11,.1);  color: var(--yellow); border: 1px solid rgba(245,158,11,.3); }

    /* STUDENT CARD */
    .student-card {
      background: rgba(34,197,94,.08);
      border: 1px solid rgba(34,197,94,.2);
      border-radius: 12px;
      padding: 14px;
      display: none;
    }

    .student-card.show { display: block; }
    .student-card .s-name { font-size: 16px; font-weight: 800; color: var(--green); }
    .student-card .s-id   { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .student-card .s-status {
      display: inline-block; margin-top: 8px;
      border-radius: 6px; padding: 3px 10px;
      font-size: 12px; font-weight: 700;
    }
    .s-status.present  { background: rgba(34,197,94,.2);  color: var(--green); }
    .s-status.late     { background: rgba(245,158,11,.2); color: var(--yellow); }
    .s-status.checkout { background: rgba(59,130,246,.2); color: var(--blue); }

    /* SESSION INFO */
    .session-info { font-size: 13px; color: var(--white); }
    .session-info .si-course { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
    .session-info .si-time   { color: var(--muted); font-size: 12px; }
    .session-info .si-none   { color: var(--muted); font-size: 13px; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-item {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      text-align: center;
    }
    .stat-item .sv { font-size: 22px; font-weight: 800; }
    .stat-item .sl { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .sv-green { color: var(--green); }
    .sv-blue  { color: var(--blue); }

    /* CANVAS HIDDEN */
    canvas#canvas { display: none; }

    /* MOBILE */
    @media(max-width: 768px) {
      .main { grid-template-columns: 1fr; }
      .side-panel { border-right: none; border-top: 1px solid var(--border); }
      #video { max-height: 55vh; }
    }
  </style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-item">
    <span class="topbar-label">القاعة</span>
    <span class="topbar-value" id="roomName">—</span>
  </div>
  <div class="topbar-item">
    <span class="topbar-label">المقرر</span>
    <span class="topbar-value" id="courseName">—</span>
  </div>
  <div class="topbar-item">
    <span class="topbar-label">الدكتور</span>
    <span class="topbar-value" id="doctorName">—</span>
  </div>
  <div class="topbar-item">
    <span class="clock" id="clock">--:--:--</span>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn checkin active-checkin" id="btnCheckin"  onclick="setMode('checkin')">✅ حضور</button>
    <button class="mode-btn checkout"               id="btnCheckout" onclick="setMode('checkout')">🚪 انصراف</button>
    <button class="reset-btn" id="resetBtn">تغيير القاعة</button>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- Camera -->
  <div class="camera-section">
    <video id="video" autoplay playsinline></video>
    <canvas id="overlay"></canvas>
  </div>

  <!-- Side Panel -->
  <div class="side-panel">

    <div class="panel-section">
      <div class="panel-title">الحالة</div>
      <div class="status-box status-waiting" id="statusBox">⏳ جاري التهيئة...</div>
    </div>

    <div class="panel-section">
      <div class="panel-title">آخر طالب</div>
      <div class="student-card" id="studentCard">
        <div class="s-name" id="sName">—</div>
        <div class="s-id"   id="sId">—</div>
        <span class="s-status present" id="sStatus">حاضر</span>
      </div>
      <div id="noStudent" style="color:var(--muted);font-size:13px;">لم يتم التعرف بعد</div>
    </div>

    <div class="panel-section">
      <div class="panel-title">المحاضرة الحالية</div>
      <div class="session-info" id="sessionInfo">
        <div class="si-none">جاري التحقق...</div>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-title">إحصائيات الجلسة</div>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="sv sv-green" id="cntPresent">0</div>
          <div class="sl">حضور</div>
        </div>
        <div class="stat-item">
          <div class="sv sv-blue" id="cntCheckout">0</div>
          <div class="sl">انصراف</div>
        </div>
      </div>
    </div>

  </div>
</div>

<canvas id="canvas" width="640" height="480"></canvas>

<script>
// ── Init ──
const room = sessionStorage.getItem("kiosk_room");
const code = sessionStorage.getItem("kiosk_code");
if (!room || !code) { window.location.href = "/kiosk/setup"; }

let kioskMode = sessionStorage.getItem("kiosk_mode") || "checkin";
let activeSessionId = null;
let cntPresent = 0, cntCheckout = 0;
let busy = false;
let clearBoxTimer = null;

// Elements
const video      = document.getElementById("video");
const canvas     = document.getElementById("canvas");
const overlay    = document.getElementById("overlay");
const octx       = overlay.getContext("2d");
const statusBox  = document.getElementById("statusBox");
const studentCard = document.getElementById("studentCard");
const noStudent  = document.getElementById("noStudent");

document.getElementById("roomName").textContent = room || "—";
document.getElementById("resetBtn").addEventListener("click", () => {
  sessionStorage.clear();
  window.location.href = "/kiosk/setup";
});

// ── Clock ──
function updateClock(){
  document.getElementById("clock").textContent =
    new Date().toLocaleTimeString("en-GB");
}
setInterval(updateClock, 1000);
updateClock();

// ── Mode ──
function setMode(m) {
  kioskMode = m;
  sessionStorage.setItem("kiosk_mode", m);
  document.getElementById("btnCheckin").className  = "mode-btn checkin"  + (m === "checkin"  ? " active-checkin"  : "");
  document.getElementById("btnCheckout").className = "mode-btn checkout" + (m === "checkout" ? " active-checkout" : "");
  setStatus(m === "checkin" ? "scanning" : "warning",
            m === "checkin" ? "📷 وضع الحضور — في انتظار الوجه" : "🚪 وضع الانصراف — في انتظار الوجه");
}
setMode(kioskMode);

// ── Camera ──
navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 1280, height: 720 }, audio: false })
  .then(stream => {
    video.srcObject = stream;
    setStatus("scanning", "📷 الكاميرا جاهزة — في انتظار الوجه");
  })
  .catch(() => setStatus("error", "❌ تعذر تشغيل الكاميرا"));

// ── Overlay Resize ──
function syncOverlay() {
  const r = video.getBoundingClientRect();
  overlay.width  = Math.round(r.width)  || 640;
  overlay.height = Math.round(r.height) || 480;
}
window.addEventListener("resize", syncOverlay);
video.addEventListener("loadedmetadata", syncOverlay);

function clearBox() { octx.clearRect(0, 0, overlay.width, overlay.height); }

// ── Draw Face Box ── أحمر = غير معروف / أخضر = معروف
function drawFaceBox(box, label, recognized) {
  syncOverlay();
  clearBox();
  const r   = video.getBoundingClientRect();
  const sx  = r.width  / 640;
  const sy  = r.height / 480;
  const x   = Math.max(0, box[0] * sx);
  const y   = Math.max(0, box[1] * sy);
  const w   = Math.min(overlay.width  - x, box[2] * sx);
  const h   = Math.min(overlay.height - y, box[3] * sy);
  const col = recognized ? "#22c55e" : "#ef4444";

  octx.save();

  // الإطار الرئيسي
  octx.lineWidth   = 4;
  octx.strokeStyle = col;
  octx.shadowColor = col;
  octx.shadowBlur  = 14;
  roundRect(octx, x, y, w, h, 14);
  octx.stroke();

  // Label
  if (label) {
    octx.shadowBlur = 0;
    octx.font = "bold 15px Arial";
    const tw = octx.measureText(label).width;
    const lw = tw + 24, lh = 32;
    let lx = x, ly = y - lh - 8;
    if (ly < 4) ly = y + 8;
    if (lx + lw > overlay.width - 4) lx = overlay.width - lw - 4;

    octx.fillStyle   = "rgba(0,0,0,.78)";
    octx.strokeStyle = col;
    octx.lineWidth   = 1.5;
    roundRect(octx, lx, ly, lw, lh, 8);
    octx.fill(); octx.stroke();

    octx.fillStyle    = "#fff";
    octx.textAlign    = "center";
    octx.textBaseline = "middle";
    octx.fillText(label, lx + lw / 2, ly + lh / 2);
  }

  octx.restore();

  if (clearBoxTimer) clearTimeout(clearBoxTimer);
  clearBoxTimer = setTimeout(clearBox, 2400);
}

function roundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

// ── Status ──
function setStatus(type, text) {
  statusBox.className = "status-box status-" + type;
  statusBox.textContent = text;
}

// ── Session ──
async function fetchSession() {
  try {
    const res  = await fetch(`/kiosk/active?room_name=${encodeURIComponent(room)}&room_code=${encodeURIComponent(code)}`);
    const data = await res.json();
    const si   = document.getElementById("sessionInfo");
    const dn   = document.getElementById("doctorName");
    const cn   = document.getElementById("courseName");

    if (!data.ok || !data.session) {
      activeSessionId = null;
      si.innerHTML = '<div class="si-none">لا توجد محاضرة نشطة الآن</div>';
      cn.textContent = "—";
      dn.textContent = "—";
      setStatus("warning", "⚠️ لا توجد محاضرة نشطة الآن");
      return;
    }
    activeSessionId = data.session.session_id;
    cn.textContent = data.session.course_name || "—";
    dn.textContent = data.session.doctor_name  || "—";
    si.innerHTML = `
      <div class="si-course">${data.session.course_name || "—"}</div>
      <div class="si-time">⏰ ${data.session.start_time} — ${data.session.end_time}</div>
      ${data.session.doctor_name ? `<div class="si-time" style="margin-top:4px;">👨‍🏫 ${data.session.doctor_name}</div>` : ""}
    `;
    setStatus("scanning", "📷 جاهز — في انتظار الوجه");
  } catch(e) {
    setStatus("error", "❌ تعذر الاتصال بالخادم");
  }
}
setInterval(fetchSession, 15000);
fetchSession();

// ── Capture Loop ──
setInterval(captureAndSend, 900);

async function captureAndSend() {
  if (busy || !activeSessionId || !video.videoWidth) return;
  busy = true;
  try {
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, 640, 480);
    const image = canvas.toDataURL("image/jpeg", 0.75);

    const res  = await fetch("/kiosk/capture", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ image, room_name: room, room_code: code, mode: kioskMode })
    });
    const data = await res.json();

    if (!data.ok) {
      setStatus("warning", "⚠️ " + (data.message || "لا توجد محاضرة نشطة"));
      return;
    }

    // وجه موجود لكن غير معروف
    if (data.box && !data.recognized) {
      drawFaceBox(data.box, "غير معروف ❌", false);
      setStatus("error", "❌ وجه غير مسجل في النظام");
      return;
    }

    // وجه معروف
    if (data.recognized && data.student) {
      const label = `${data.student.name} — ${data.student.academic_number}`;
      drawFaceBox(data.box || [0,0,0,0], label, true);

      if (kioskMode === "checkout") {
        if (data.checked_out) {
          showStudent(data.student, "checkout");
          setStatus("success", "🚪 تم تسجيل الانصراف");
          cntCheckout++;
          document.getElementById("cntCheckout").textContent = cntCheckout;
        } else {
          showStudent(data.student, "late");
          setStatus("warning", "⚠️ " + (data.message || "لا يمكن الانصراف"));
        }
      } else {
        if (data.new_record) {
          const isLate = (data.student.status || "").toLowerCase() === "late";
          showStudent(data.student, isLate ? "late" : "present");
          setStatus("success", isLate ? "⏰ تم التسجيل — متأخر" : "✅ تم تسجيل الحضور");
          cntPresent++;
          document.getElementById("cntPresent").textContent = cntPresent;
        } else {
          showStudent(data.student, "present");
          setStatus("warning", "⚠️ تم تسجيله مسبقًا");
        }
      }
    }

  } catch(e) {
    setStatus("error", "❌ خطأ في الاتصال");
  } finally {
    busy = false;
  }
}

function showStudent(stu, type) {
  document.getElementById("sName").textContent = stu.name || "—";
  document.getElementById("sId").textContent   = stu.academic_number || "—";
  const badge = document.getElementById("sStatus");
  if (type === "checkout") { badge.className = "s-status checkout"; badge.textContent = "🚪 انصراف"; }
  else if (type === "late") { badge.className = "s-status late"; badge.textContent = "⏰ متأخر"; }
  else { badge.className = "s-status present"; badge.textContent = "✅ حاضر"; }
  studentCard.classList.add("show");
  noStudent.style.display = "none";
}

// ── Audio ──
let audioCtx = null;
function beep(f, d, t) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = t || "sine"; o.frequency.value = f; g.gain.value = 0.07;
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); setTimeout(() => o.stop(), d);
  } catch(e) {}
}
</script>
</body>
</html>
