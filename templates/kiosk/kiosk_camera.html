<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>كشك الحضور</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#060d14;--panel:#0a1929;--border:#1a3348;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--white:#f1f5f9;--muted:#64748b;}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{width:100%;height:100%;background:var(--bg);color:var(--white);font-family:'Tajawal',sans-serif;overflow:hidden;}
    #video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;background:#000;transform:scaleX(-1);}
    #overlay{position:fixed;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;}
    canvas{display:none;}
    .progress-bar{position:fixed;top:0;left:0;right:0;height:3px;z-index:20;background:rgba(255,255,255,.1);}
    .progress-fill{height:100%;background:var(--green);transition:width 1s linear;border-radius:0 2px 2px 0;}
    .topbar{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:env(safe-area-inset-top,12px) 20px 12px;background:linear-gradient(to bottom,rgba(6,13,20,.92),transparent);}
    .topbar-left{display:flex;flex-direction:column;gap:2px;}
    .room-label{font-size:11px;color:rgba(255,255,255,.5);font-weight:500;}
    .room-name{font-size:18px;font-weight:800;color:var(--white);}
    .course-name{font-size:13px;color:rgba(255,255,255,.7);margin-top:2px;}
    .topbar-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
    .clock{font-family:monospace;font-size:20px;font-weight:700;color:var(--green);}
    .mode-badge{display:inline-flex;align-items:center;gap:6px;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:700;backdrop-filter:blur(8px);}
    .mode-badge.checkin{background:rgba(34,197,94,.25);color:var(--green);border:1px solid rgba(34,197,94,.4);}
    .mode-badge.checkout{background:rgba(59,130,246,.25);color:var(--blue);border:1px solid rgba(59,130,246,.4);}
    .mode-badge.closed{background:rgba(239,68,68,.25);color:var(--red);border:1px solid rgba(239,68,68,.4);}
    .mode-badge.waiting{background:rgba(245,158,11,.25);color:var(--yellow);border:1px solid rgba(245,158,11,.4);}
    .pulse{display:inline-block;width:8px;height:8px;border-radius:50%;animation:pulse 1.5s ease-in-out infinite;}
    .pulse-green{background:var(--green);}.pulse-blue{background:var(--blue);}.pulse-red{background:var(--red);}.pulse-yellow{background:var(--yellow);}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
    .doctor-badge{position:fixed;top:0;left:50%;transform:translateX(-50%);margin-top:env(safe-area-inset-top,10px);z-index:10;background:rgba(10,25,41,.8);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:20px;padding:6px 16px;font-size:12px;color:rgba(255,255,255,.6);white-space:nowrap;}
    .face-guide{position:fixed;top:50%;left:50%;transform:translate(-50%,-55%);width:min(220px,55vw);height:min(280px,70vw);z-index:3;pointer-events:none;}
    .face-guide::before{content:"";position:absolute;inset:0;background:linear-gradient(var(--green),var(--green)) top left/44px 3px no-repeat,linear-gradient(var(--green),var(--green)) top left/3px 44px no-repeat,linear-gradient(var(--green),var(--green)) top right/44px 3px no-repeat,linear-gradient(var(--green),var(--green)) top right/3px 44px no-repeat,linear-gradient(var(--green),var(--green)) bottom left/44px 3px no-repeat,linear-gradient(var(--green),var(--green)) bottom left/3px 44px no-repeat,linear-gradient(var(--green),var(--green)) bottom right/44px 3px no-repeat,linear-gradient(var(--green),var(--green)) bottom right/3px 44px no-repeat;border-radius:24px;filter:drop-shadow(0 0 10px rgba(34,197,94,.5));transition:all .3s;}
    .face-guide.red::before{background:linear-gradient(var(--red),var(--red)) top left/44px 3px no-repeat,linear-gradient(var(--red),var(--red)) top left/3px 44px no-repeat,linear-gradient(var(--red),var(--red)) top right/44px 3px no-repeat,linear-gradient(var(--red),var(--red)) top right/3px 44px no-repeat,linear-gradient(var(--red),var(--red)) bottom left/44px 3px no-repeat,linear-gradient(var(--red),var(--red)) bottom left/3px 44px no-repeat,linear-gradient(var(--red),var(--red)) bottom right/44px 3px no-repeat,linear-gradient(var(--red),var(--red)) bottom right/3px 44px no-repeat;filter:drop-shadow(0 0 10px rgba(239,68,68,.5));}
    .hint-text{position:fixed;top:calc(50% + min(155px,39vw));left:50%;transform:translateX(-50%);z-index:3;font-size:14px;font-weight:600;color:rgba(255,255,255,.75);text-align:center;background:rgba(6,13,20,.5);backdrop-filter:blur(4px);padding:6px 16px;border-radius:20px;pointer-events:none;}
    .bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:16px 20px env(safe-area-inset-bottom,16px);background:linear-gradient(to top,rgba(6,13,20,.95),transparent);display:flex;flex-direction:column;gap:10px;}
    .student-card{display:none;background:rgba(10,25,41,.85);backdrop-filter:blur(12px);border-radius:16px;padding:14px 18px;border:1px solid rgba(255,255,255,.08);animation:slideUp .3s ease both;}
    .student-card.show{display:flex;align-items:center;gap:14px;}
    @keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .student-avatar{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,#0b3c5d,#1a6494);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0;}
    .student-info{flex:1;}
    .student-name{font-size:15px;font-weight:700;color:var(--white);}
    .student-id{font-size:12px;color:var(--muted);margin-top:2px;}
    .student-badge{display:inline-block;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;}
    .sb-present{background:rgba(34,197,94,.2);color:var(--green);}
    .sb-late{background:rgba(245,158,11,.2);color:var(--yellow);}
    .sb-checkout{background:rgba(59,130,246,.2);color:var(--blue);}
    .status-text{text-align:center;font-size:15px;font-weight:700;padding:12px;border-radius:12px;backdrop-filter:blur(8px);}
    .st-scanning{background:rgba(245,158,11,.15);color:var(--yellow);}
    .st-success{background:rgba(34,197,94,.15);color:var(--green);}
    .st-error{background:rgba(239,68,68,.15);color:var(--red);}
    .st-warning{background:rgba(245,158,11,.15);color:var(--yellow);}
    .st-closed{background:rgba(100,116,139,.15);color:var(--muted);}
    .stats-row{display:flex;gap:8px;justify-content:center;}
    .stat-pill{background:rgba(10,25,41,.7);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;}
  </style>
</head>
<body>

<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
<video id="video" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>
<canvas id="canvas" width="640" height="480"></canvas>
<div class="face-guide" id="faceGuide"></div>
<div class="hint-text"  id="hintText">ضع وجهك داخل الإطار</div>
<div class="doctor-badge" id="doctorBadge">👨‍🏫 —</div>

<div class="topbar">
  <div class="topbar-left">
    <span class="room-label">القاعة</span>
    <span class="room-name"  id="roomName">—</span>
    <span class="course-name" id="courseName">جاري التحقق...</span>
  </div>
  <div class="topbar-right">
    <span class="clock" id="clock">--:--</span>
    <div class="mode-badge waiting" id="modeBadge">
      <span class="pulse pulse-yellow" id="pulseDot"></span>
      <span id="modeText">جاري التهيئة</span>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <div class="stats-row">
    <div class="stat-pill">✅ <span id="cntPresent">0</span> حضور</div>
    <div class="stat-pill">🚪 <span id="cntCheckout">0</span> انصراف</div>
    <div class="stat-pill" id="timeRemaining">⏰ —</div>
  </div>
  <div class="student-card" id="studentCard">
    <div class="student-avatar" id="sAvatar">؟</div>
    <div class="student-info">
      <div class="student-name" id="sName">—</div>
      <div class="student-id"   id="sId">—</div>
    </div>
    <span class="student-badge sb-present" id="sBadge">✅ حاضر</span>
  </div>
  <div class="status-text st-scanning" id="statusText">📷 جاري التهيئة...</div>
</div>


<!-- Logo Badge -->
<div style="
  position:fixed;
  bottom:160px;
  left:50%;
  transform:translateX(-50%);
  z-index:10;
  display:flex;
  align-items:center;
  gap:10px;
  background:rgba(6,13,20,.75);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:16px;
  padding:9px 20px;
  white-space:nowrap;
">
  <div style="width:32px;height:32px;background:linear-gradient(135deg,#0b3c5d,#1a6494);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;">🎓</div>
  <div>
    <div style="font-size:13px;font-weight:800;color:#fff;line-height:1.2;">جامعة حائل</div>
    <div style="font-size:10px;color:rgba(255,255,255,.45);">نظام الحضور الذكي</div>
  </div>
</div>
<script>
const CHECK_BEFORE_SEC  = 60;
const LATE_MIN          = 15;
const CLOSE_AFTER_MIN   = 15;
const CHECKOUT_BEFORE   = 5;
const CAPTURE_MS        = 1100;
const POLL_SEC          = 20;
const MOTION_THRESHOLD  = 3.5;
const MOTION_FRAMES     = 5;

const room = sessionStorage.getItem("kiosk_room");
const code = sessionStorage.getItem("kiosk_code");
if (!room || !code) { window.location.href = "/kiosk/setup"; }

let activeSession = null;
let kioskState    = "waiting";
let cntPresent    = 0, cntCheckout = 0;
let busy          = false;
let clearBoxTimer = null;
let frameHist     = [];
let lastFP        = null;
let studentTimer  = null;

const video     = document.getElementById("video");
const canvas    = document.getElementById("canvas");
const overlay   = document.getElementById("overlay");
const octx      = overlay.getContext("2d");
const faceGuide = document.getElementById("faceGuide");

document.getElementById("roomName").textContent = room || "—";

// Clock
function updateClock(){
  const n = new Date();
  document.getElementById("clock").textContent =
    n.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
}
setInterval(updateClock,1000); updateClock();

// ── Camera — يجرب كل الكاميرات المتاحة ──
async function startCamera(){
  try {
    // أولاً جرب بدون facingMode — يشتغل على اللاب توب والجوال
    const s = await navigator.mediaDevices.getUserMedia({
      video: { width:{ideal:1280}, height:{ideal:720} },
      audio: false
    });
    video.srcObject = s;
    await video.play();
    syncOverlay();
    setStatus("scanning","📷 الكاميرا جاهزة");
    return;
  } catch(e1) {}

  try {
    // ثانياً جرب أي كاميرا متاحة
    const s = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    video.srcObject = s;
    await video.play();
    syncOverlay();
    setStatus("scanning","📷 الكاميرا جاهزة");
    return;
  } catch(e2) {}

  try {
    // ثالثاً جرب الكاميرا الأمامية (للجوال)
    const s = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" },
      audio: false
    });
    video.srcObject = s;
    await video.play();
    syncOverlay();
    setStatus("scanning","📷 الكاميرا جاهزة");
    return;
  } catch(e3) {
    setStatus("error","❌ تعذر تشغيل الكاميرا — تأكد من الإذن");
  }
}

function syncOverlay(){
  overlay.width  = window.innerWidth;
  overlay.height = window.innerHeight;
}
window.addEventListener("resize",syncOverlay);
syncOverlay();

function clearBox(){ octx.clearRect(0,0,overlay.width,overlay.height); }

// Anti-spoofing
function getFingerprint(){
  if(!video.videoWidth) return null;
  const t = document.createElement("canvas");
  t.width=24; t.height=18;
  t.getContext("2d").drawImage(video,0,0,24,18);
  const d = t.getContext("2d").getImageData(0,0,24,18).data;
  const a = new Uint8Array(24*18);
  for(let i=0,j=0;i<d.length;i+=4) a[j++]=(d[i]*.299+d[i+1]*.587+d[i+2]*.114)|0;
  return a;
}

function motionDiff(a,b){
  if(!a||!b) return 999;
  let s=0; for(let i=0;i<a.length;i++) s+=Math.abs(a[i]-b[i]);
  return s/a.length;
}

function getTextureScore(){
  if(!video.videoWidth) return 999;
  const t=document.createElement("canvas");
  t.width=32;t.height=32;
  const tc=t.getContext("2d");
  tc.drawImage(video,0,0,32,32);
  const d=tc.getImageData(0,0,32,32).data;
  let sum=0,sum2=0,n=0;
  for(let i=0;i<d.length;i+=4){
    const v=d[i]*.299+d[i+1]*.587+d[i+2]*.114;
    sum+=v;sum2+=v*v;n++;
  }
  const mean=sum/n;
  return Math.sqrt(Math.max(sum2/n-mean*mean,0));
}

function isLive(){
  const fp=getFingerprint();
  const d=motionDiff(fp,lastFP);
  lastFP=fp;
  frameHist.push(d);
  if(frameHist.length>MOTION_FRAMES) frameHist.shift();
  if(frameHist.length<MOTION_FRAMES) return false;
  const avg=frameHist.reduce((a,b)=>a+b,0)/frameHist.length;
  const variance=Math.max(...frameHist)-Math.min(...frameHist);
  const motionOk=avg>MOTION_THRESHOLD&&variance>5.0;
  const tex=getTextureScore();
  const texOk=tex>22.0;
  if(!window._tH) window._tH=[];
  window._tH.push(tex);
  if(window._tH.length>10) window._tH.shift();
  const texChange=window._tH.length>5?Math.max(...window._tH)-Math.min(...window._tH):999;
  const texChangeOk=texChange>2.0;
  return motionOk&&texOk&&texChangeOk;
}

// Draw Box
function drawFaceBox(box, name, id, recognized, late){
  syncOverlay(); clearBox();
  const sx = window.innerWidth/640, sy = window.innerHeight/480;
  const rawX = box[0]*sx, y = box[1]*sy, w = box[2]*sx, h = box[3]*sy;
  const x = window.innerWidth - rawX - w;
  const col = recognized ? (late?"#f59e0b":"#22c55e") : "#ef4444";

  octx.save();
  octx.shadowColor=col; octx.shadowBlur=18;
  octx.lineWidth=3.5; octx.strokeStyle=col;

  const cs=30, cr=10;
  const corners=[[x,y],[x+w-cs,y],[x,y+h-cs],[x+w-cs,y+h-cs]];
  corners.forEach(([cx,cy],i)=>{
    const R=i%2===1, B=i>=2;
    octx.beginPath();
    if(!R&&!B){octx.moveTo(cx+cr,cy);octx.lineTo(cx+cs,cy);octx.moveTo(cx,cy+cr);octx.lineTo(cx,cy+cs);octx.arc(cx+cr,cy+cr,cr,Math.PI,Math.PI*1.5);}
    else if(R&&!B){octx.moveTo(cx,cy);octx.lineTo(cx+cs-cr,cy);octx.moveTo(cx+cs,cy+cr);octx.lineTo(cx+cs,cy+cs);octx.arc(cx+cs-cr,cy+cr,cr,Math.PI*1.5,0);}
    else if(!R&&B){octx.moveTo(cx,cy);octx.lineTo(cx,cy+cs-cr);octx.moveTo(cx+cr,cy+cs);octx.lineTo(cx+cs,cy+cs);octx.arc(cx+cr,cy+cs-cr,cr,Math.PI*.5,Math.PI);}
    else{octx.moveTo(cx+cs,cy);octx.lineTo(cx+cs,cy+cs-cr);octx.moveTo(cx,cy+cs);octx.lineTo(cx+cs-cr,cy+cs);octx.arc(cx+cs-cr,cy+cs-cr,cr,0,Math.PI*.5);}
    octx.stroke();
  });

  if(name||id){
    octx.shadowBlur=0;
    const lines=[name||"",id||""].filter(Boolean);
    const fs=Math.max(13,Math.min(16,window.innerWidth/28));
    octx.font=`700 ${fs}px Tajawal,Arial`;
    const maxW=lines.reduce((m,l)=>Math.max(m,octx.measureText(l).width),0);
    const lw=maxW+28, lh=lines.length*(fs+6)+12;
    let lx=x, ly=y-lh-10;
    if(ly<4) ly=y+h+6;
    if(lx+lw>overlay.width-4) lx=overlay.width-lw-4;
    octx.fillStyle="rgba(6,13,20,.88)"; octx.strokeStyle=col; octx.lineWidth=1.5;
    roundRect(octx,lx,ly,lw,lh,10); octx.fill(); octx.stroke();
    octx.textAlign="center"; octx.textBaseline="top";
    lines.forEach((line,i)=>{
      octx.fillStyle=i===0?"#fff":"rgba(255,255,255,.65)";
      octx.font=i===0?`700 ${fs}px Tajawal,Arial`:`500 ${fs-2}px Tajawal,Arial`;
      octx.fillText(line,lx+lw/2,ly+8+i*(fs+6));
    });
  }
  octx.restore();
  if(clearBoxTimer) clearTimeout(clearBoxTimer);
  clearBoxTimer=setTimeout(()=>{clearBox();faceGuide.classList.remove("red");},2800);
}

function roundRect(ctx,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}

function setStatus(type,text){
  const el=document.getElementById("statusText");
  el.className="status-text st-"+type; el.textContent=text;
}

function setMode(state){
  kioskState=state;
  const badge=document.getElementById("modeBadge");
  const text=document.getElementById("modeText");
  const dot=document.getElementById("pulseDot");
  const hint=document.getElementById("hintText");
  badge.className="mode-badge "+state;
  if(state==="checkin"){
    text.textContent="✅ تسجيل الحضور"; dot.className="pulse pulse-green";
    faceGuide.classList.remove("red"); hint.textContent="ضع وجهك للتحضير";
    setStatus("scanning","📷 جاهز — ضع وجهك أمام الكاميرا");
  }else if(state==="checkout"){
    text.textContent="🚪 تسجيل الانصراف"; dot.className="pulse pulse-blue";
    faceGuide.classList.remove("red"); hint.textContent="ضع وجهك للانصراف";
    setStatus("scanning","🚪 وضع الانصراف — ضع وجهك");
  }else if(state==="closed"){
    text.textContent="🔒 انتهت المحاضرة"; dot.className="pulse pulse-red";
    faceGuide.classList.add("red"); hint.textContent="انتهى وقت التسجيل";
    setStatus("closed","🔒 انتهى وقت التسجيل");
  }else{
    text.textContent="⏳ بانتظار المحاضرة"; dot.className="pulse pulse-yellow";
    hint.textContent="ستبدأ المحاضرة قريباً";
    setStatus("warning","⏳ المحاضرة لم تبدأ بعد");
  }
}

function timeToMin(hhmm){ const[h,m]=(hhmm||"00:00").split(":").map(Number); return h*60+m; }
function nowMin(){ const n=new Date(); return n.getHours()*60+n.getMinutes()+n.getSeconds()/60; }

function updateProgress(startMin,endMin){
  const now=nowMin(), total=endMin-startMin, elapsed=now-startMin;
  const pct=Math.max(0,Math.min(100,(elapsed/total)*100));
  document.getElementById("progressFill").style.width=pct+"%";
  const rem=Math.max(0,endMin-now);
  document.getElementById("timeRemaining").textContent=
    rem>1 ? `⏰ ${Math.floor(rem)} دقيقة` : "⏰ أقل من دقيقة";
}

function determineState(s){
  if(!s){ setMode("waiting"); return; }
  const startMin=timeToMin(s.start_time), endMin=timeToMin(s.end_time);
  const now=nowMin();
  const openFrom=startMin-(CHECK_BEFORE_SEC/60), closeAt=endMin+CLOSE_AFTER_MIN;
  const checkoutFrom=endMin-CHECKOUT_BEFORE;
  updateProgress(startMin,endMin);
  if(now<openFrom) setMode("waiting");
  else if(now<checkoutFrom) setMode("checkin");
  else if(now<closeAt) setMode("checkout");
  else setMode("closed");
}

async function fetchSession(){
  try{
    const res=await fetch(`/kiosk/active?room_name=${encodeURIComponent(room)}&room_code=${encodeURIComponent(code)}`);
    const data=await res.json();
    if(!data.ok||!data.session){
      activeSession=null;
      document.getElementById("courseName").textContent="لا توجد محاضرة";
      document.getElementById("doctorBadge").textContent="👨‍🏫 —";
      setMode("waiting"); return;
    }
    activeSession=data.session;
    document.getElementById("courseName").textContent=data.session.course_name||"—";
    document.getElementById("doctorBadge").textContent="👨‍🏫 "+(data.session.doctor_name||"—");
    determineState(activeSession);
  }catch(e){ setStatus("error","❌ خطأ في الاتصال"); }
}

setInterval(()=>{ if(activeSession) determineState(activeSession); },1000);
setInterval(fetchSession,POLL_SEC*1000);
fetchSession();

setInterval(captureAndSend,CAPTURE_MS);

async function captureAndSend(){
  if(busy||!activeSession||!video.videoWidth) return;
  if(kioskState==="waiting"||kioskState==="closed") return;
  if(!isLive()) return;
  busy=true;
  try{
    const ctx=canvas.getContext("2d");
    ctx.save(); ctx.scale(-1,1); ctx.drawImage(video,-640,0,640,480); ctx.restore();
    const image=canvas.toDataURL("image/jpeg",.80);
    const res=await fetch("/kiosk/capture",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({image,room_name:room,room_code:code,mode:kioskState})
    });
    const data=await res.json();
    if(!data.ok){ setStatus("warning","⚠️ "+(data.message||"لا توجد محاضرة")); return; }
    if(!data.recognized){
      if(data.box){ faceGuide.classList.add("red"); drawFaceBox(data.box,null,"غير مسجل ❌",false,false); setStatus("error","❌ وجه غير مسجل"); }
      return;
    }
    faceGuide.classList.remove("red");
    const stu=data.student;
    if(kioskState==="checkout"){
      if(data.checked_out){
        drawFaceBox(data.box,stu.name,stu.academic_number,true,false);
        showStudent(stu,"checkout"); setStatus("success","🚪 انصراف — "+stu.name);
        cntCheckout++; document.getElementById("cntCheckout").textContent=cntCheckout;
        beep(700,130); setTimeout(()=>beep(900,130),150);
      }else{
        drawFaceBox(data.box,stu.name,stu.academic_number,true,true);
        showStudent(stu,"late"); setStatus("warning","⚠️ "+(data.message||"انصراف مسبق"));
      }
    }else{
      if(data.new_record){
        const isLate=(stu.status||"").toLowerCase()==="late";
        drawFaceBox(data.box,stu.name,stu.academic_number,true,isLate);
        showStudent(stu,isLate?"late":"present");
        setStatus("success",isLate?"⏰ متأخر — "+stu.name:"✅ حضور — "+stu.name);
        cntPresent++; document.getElementById("cntPresent").textContent=cntPresent;
        beep(880,110); setTimeout(()=>beep(1200,110),130);
      }else{
        drawFaceBox(data.box,stu.name,stu.academic_number,true,false);
        showStudent(stu,"present"); setStatus("warning","⚠️ مسجل مسبقاً — "+stu.name);
      }
    }
  }catch(e){ setStatus("error","❌ خطأ"); }
  finally{ busy=false; }
}

function showStudent(stu,type){
  const card=document.getElementById("studentCard");
  document.getElementById("sAvatar").textContent=(stu.name||"؟")[0];
  document.getElementById("sName").textContent=stu.name||"—";
  document.getElementById("sId").textContent=stu.academic_number||"—";
  const b=document.getElementById("sBadge");
  if(type==="checkout"){b.className="student-badge sb-checkout";b.textContent="🚪 انصراف";}
  else if(type==="late"){b.className="student-badge sb-late";b.textContent="⏰ متأخر";}
  else{b.className="student-badge sb-present";b.textContent="✅ حاضر";}
  card.classList.add("show");
  if(studentTimer) clearTimeout(studentTimer);
  studentTimer=setTimeout(()=>card.classList.remove("show"),5000);
}

let audioCtx=null;
function beep(f,d){
  try{
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.frequency.value=f;g.gain.value=.06;o.connect(g);g.connect(audioCtx.destination);
    o.start();setTimeout(()=>o.stop(),d);
  }catch(e){}
}

startCamera();
</script>
