      --blue:    #3b82f6;
      --white:   #f1f5f9;
      --muted:   #64748b;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== TOPBAR ===== */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      flex-wrap: wrap;
    }

    .topbar-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .topbar-label { font-size: 11px; color: var(--muted); font-weight: 500; }
    .topbar-value { font-size: 14px; font-weight: 700; color: var(--white); }

    .clock { font-family: monospace; font-size: 18px; font-weight: 700; color: var(--green); }

    /* MODE TOGGLE */
    .mode-toggle {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .mode-btn {
      border: none; border-radius: 8px; padding: 8px 16px;
      font-size: 13px; font-weight: 700; font-family: 'Tajawal', sans-serif;
      cursor: pointer; transition: all .2s;
    }

    .mode-btn.checkin  { background: rgba(34,197,94,.15);  color: var(--green); border: 1px solid rgba(34,197,94,.3); }
    .mode-btn.checkout { background: rgba(59,130,246,.15); color: var(--blue);  border: 1px solid rgba(59,130,246,.3); }
    .mode-btn.active-checkin  { background: var(--green); color: #000; }
    .mode-btn.active-checkout { background: var(--blue);  color: #fff; }

    .reset-btn {
      border: none; border-radius: 8px; padding: 8px 14px;
      font-size: 13px; font-weight: 700; font-family: 'Tajawal', sans-serif;
      cursor: pointer; background: rgba(239,68,68,.15);
      color: var(--red); border: 1px solid rgba(239,68,68,.3);
      transition: all .2s;
    }
    .reset-btn:hover { background: var(--red); color: #fff; }

    /* ===== MAIN LAYOUT ===== */
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 0;
      min-height: 0;
    }

    /* ===== CAMERA ===== */
    .camera-section {
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      max-height: calc(100vh - 120px);
    }

    #overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
      pointer-events: none;
    }

    /* ===== SIDE PANEL ===== */
    .side-panel {
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow-y: auto;
    }

    .panel-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 10px;
    }

    /* STATUS BOX */
    .status-box {
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      font-size: 15px;

      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all .3s;
    }

    .status-waiting  { background: rgba(100,116,139,.1); color: var(--muted); border: 1px solid var(--border); }

    .status-error    { background: rgba(239,68,68,.1);   color: var(--red);    border: 1px solid rgba(239,68,68,.3); }
    .status-warning  { background: rgba(245,158,11,.1);  color: var(--yellow); border: 1px solid rgba(245,158,11,.3); }

    /* STUDENT CARD */
    .student-card {

  overlay.width  = Math.round(r.width)  || 640;
  overlay.height = Math.round(r.height) || 480;
}

// ── Draw Face Box ── أحمر = غير معروف / أخضر = معروف
function drawFaceBox(box, label, recognized) {
  syncOverlay();
  clearBox();
  const r   = video.getBoundingClientRect();
  const sx  = r.width  / 640;
  const sy  = r.height / 480;
  const x   = Math.max(0, box[0] * sx);
  const y   = Math.max(0, box[1] * sy);
  const w   = Math.min(overlay.width  - x, box[2] * sx);
  const h   = Math.min(overlay.height - y, box[3] * sy);
  const col = recognized ? "#22c55e" : "#ef4444";

  octx.save();

  // الإطار الرئيسي
  octx.lineWidth   = 4;
  octx.strokeStyle = col;
  octx.shadowColor = col;
  octx.shadowBlur  = 14;
  roundRect(octx, x, y, w, h, 14);
  octx.stroke();

  // Label
  if (label) {
    octx.shadowBlur = 0;
    octx.font = "bold 15px Arial";
    const tw = octx.measureText(label).width;
    const lw = tw + 24, lh = 32;
    let lx = x, ly = y - lh - 8;
    if (ly < 4) ly = y + 8;
    if (lx + lw > overlay.width - 4) lx = overlay.width - lw - 4;

    octx.fillStyle   = "rgba(0,0,0,.78)";
    octx.strokeStyle = col;
    octx.lineWidth   = 1.5;
    roundRect(octx, lx, ly, lw, lh, 8);
    octx.fill(); octx.stroke();

    octx.fillStyle    = "#fff";
    octx.textAlign    = "center";
    octx.textBaseline = "middle";
    octx.fillText(label, lx + lw / 2, ly + lh / 2);
  }

  octx.restore();

  if (clearBoxTimer) clearTimeout(clearBoxTimer);
  clearBoxTimer = setTimeout(clearBox, 2400);
}

function roundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

// Anti-spoofing
function getFingerprint(){
  if(!video.videoWidth) return null;
  const t = document.createElement("canvas");
  t.width=24; t.height=18;
  t.getContext("2d").drawImage(video,0,0,24,18);
  const d = t.getContext("2d").getImageData(0,0,24,18).data;
  const a = new Uint8Array(24*18);
  for(let i=0,j=0;i<d.length;i+=4) a[j++]=(d[i]*.299+d[i+1]*.587+d[i+2]*.114)|0;
  return a;
}

function motionDiff(a,b){
  if(!a||!b) return 999;
  let s=0; for(let i=0;i<a.length;i++) s+=Math.abs(a[i]-b[i]);
  return s/a.length;
}

function getTextureScore(){
  if(!video.videoWidth) return 999;
  const t=document.createElement("canvas");
  t.width=32;t.height=32;
  const tc=t.getContext("2d");
  tc.drawImage(video,0,0,32,32);
  const d=tc.getImageData(0,0,32,32).data;
  let sum=0,sum2=0,n=0;
  for(let i=0;i<d.length;i+=4){
    const v=d[i]*.299+d[i+1]*.587+d[i+2]*.114;
    sum+=v;sum2+=v*v;n++;
  }
  const mean=sum/n;
  return Math.sqrt(Math.max(sum2/n-mean*mean,0));
}

function isLive(){
  const fp=getFingerprint();
  const d=motionDiff(fp,lastFP);
  lastFP=fp;
  frameHist.push(d);
  if(frameHist.length>MOTION_FRAMES) frameHist.shift();
  if(frameHist.length<MOTION_FRAMES) return false;
  const avg=frameHist.reduce((a,b)=>a+b,0)/frameHist.length;
  const variance=Math.max(...frameHist)-Math.min(...frameHist);
  const motionOk=avg>MOTION_THRESHOLD&&variance>5.0;
  const tex=getTextureScore();
  const texOk=tex>22.0;
  if(!window._tH) window._tH=[];
  window._tH.push(tex);
  if(window._tH.length>10) window._tH.shift();
  const texChange=window._tH.length>5?Math.max(...window._tH)-Math.min(...window._tH):999;
  const texChangeOk=texChange>2.0;
  return motionOk&&texOk&&texChangeOk;
}

// Draw Box
function drawFaceBox(box, name, id, recognized, late){
  syncOverlay(); clearBox();
  const sx = window.innerWidth/640, sy = window.innerHeight/480;
  const rawX = box[0]*sx, y = box[1]*sy, w = box[2]*sx, h = box[3]*sy;
  const x = window.innerWidth - rawX - w;
  const col = recognized ? (late?"#f59e0b":"#22c55e") : "#ef4444";

  octx.save();
  octx.shadowColor=col; octx.shadowBlur=18;
  octx.lineWidth=3.5; octx.strokeStyle=col;

  const cs=30, cr=10;
  const corners=[[x,y],[x+w-cs,y],[x,y+h-cs],[x+w-cs,y+h-cs]];
  corners.forEach(([cx,cy],i)=>{
    const R=i%2===1, B=i>=2;
    octx.beginPath();
    if(!R&&!B){octx.moveTo(cx+cr,cy);octx.lineTo(cx+cs,cy);octx.moveTo(cx,cy+cr);octx.lineTo(cx,cy+cs);octx.arc(cx+cr,cy+cr,cr,Math.PI,Math.PI*1.5);}
    else if(R&&!B){octx.moveTo(cx,cy);octx.lineTo(cx+cs-cr,cy);octx.moveTo(cx+cs,cy+cr);octx.lineTo(cx+cs,cy+cs);octx.arc(cx+cs-cr,cy+cr,cr,Math.PI*1.5,0);}
    else if(!R&&B){octx.moveTo(cx,cy);octx.lineTo(cx,cy+cs-cr);octx.moveTo(cx+cr,cy+cs);octx.lineTo(cx+cs,cy+cs);octx.arc(cx+cr,cy+cs-cr,cr,Math.PI*.5,Math.PI);}
    else{octx.moveTo(cx+cs,cy);octx.lineTo(cx+cs,cy+cs-cr);octx.moveTo(cx,cy+cs);octx.lineTo(cx+cs-cr,cy+cs);octx.arc(cx+cs-cr,cy+cs-cr,cr,0,Math.PI*.5);}
    octx.stroke();
  });

  if(name||id){
    octx.shadowBlur=0;
    const lines=[name||"",id||""].filter(Boolean);
    const fs=Math.max(13,Math.min(16,window.innerWidth/28));
    octx.font=`700 ${fs}px Tajawal,Arial`;
    const maxW=lines.reduce((m,l)=>Math.max(m,octx.measureText(l).width),0);
    const lw=maxW+28, lh=lines.length*(fs+6)+12;
    let lx=x, ly=y-lh-10;
    if(ly<4) ly=y+h+6;
    if(lx+lw>overlay.width-4) lx=overlay.width-lw-4;
    octx.fillStyle="rgba(6,13,20,.88)"; octx.strokeStyle=col; octx.lineWidth=1.5;
    roundRect(octx,lx,ly,lw,lh,10); octx.fill(); octx.stroke();
    octx.textAlign="center"; octx.textBaseline="top";
    lines.forEach((line,i)=>{
      octx.fillStyle=i===0?"#fff":"rgba(255,255,255,.65)";
      octx.font=i===0?`700 ${fs}px Tajawal,Arial`:`500 ${fs-2}px Tajawal,Arial`;
      octx.fillText(line,lx+lw/2,ly+8+i*(fs+6));
    });
  }
  octx.restore();
  if(clearBoxTimer) clearTimeout(clearBoxTimer);
  clearBoxTimer=setTimeout(()=>{clearBox();faceGuide.classList.remove("red");},2800);
}

function timeToMin(hhmm){ const[h,m]=(hhmm||"00:00").split(":").map(Number); return h*60+m; }
function nowMin(){ const n=new Date(); return n.getHours()*60+n.getMinutes()+n.getSeconds()/60; }

function updateProgress(startMin,endMin){
  const now=nowMin(), total=endMin-startMin, elapsed=now-startMin;
  const pct=Math.max(0,Math.min(100,(elapsed/total)*100));
  document.getElementById("progressFill").style.width=pct+"%";
  const rem=Math.max(0,endMin-now);
  document.getElementById("timeRemaining").textContent=
    rem>1 ? `⏰ ${Math.floor(rem)} دقيقة` : "⏰ أقل من دقيقة";
}

function determineState(s){
  if(!s){ setMode("waiting"); return; }
  const startMin=timeToMin(s.start_time), endMin=timeToMin(s.end_time);
  const now=nowMin();
  const openFrom=startMin-(CHECK_BEFORE_SEC/60), closeAt=endMin+CLOSE_AFTER_MIN;
  const checkoutFrom=endMin-CHECKOUT_BEFORE;
  updateProgress(startMin,endMin);
  if(now<openFrom) setMode("waiting");
  else if(now<checkoutFrom) setMode("checkin");
  else if(now<closeAt) setMode("checkout");
  else setMode("closed");
}
